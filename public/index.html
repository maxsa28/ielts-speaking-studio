<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Speaking Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --gold: #c8933a;
    --gold-light: #e8b96a;
    --sage: #7a9e87;
    --rust: #b5512a;
    --muted: #8a7f6e;
    --border: #d4c8b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(200,147,58,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(122,158,135,0.06) 0%, transparent 50%);
  }

  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 48px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    background: rgba(245,240,232,0.8);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 50;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--ink);
  }
  .logo-text em {
    font-style: italic;
    color: var(--gold);
  }

  .logo-sub {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
  }

  .badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sage);
    border: 1px solid var(--sage);
    padding: 4px 10px;
    border-radius: 2px;
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 60px 48px;
  }

  .hero {
    margin-bottom: 52px;
  }

  .hero-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.15;
    font-weight: 400;
    margin-bottom: 18px;
  }

  .hero h1 span {
    font-style: italic;
    color: var(--gold);
  }

  .hero p {
    font-size: 15px;
    line-height: 1.8;
    color: var(--muted);
    max-width: 560px;
    font-weight: 300;
  }

  .input-section {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
    margin-bottom: 52px;
  }

  .input-label {
    padding: 18px 24px 0;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-label::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    flex-shrink: 0;
  }

  textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    padding: 16px 24px 20px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--ink);
    background: transparent;
    min-height: 130px;
  }

  textarea::placeholder { color: var(--border); }

  .input-footer {
    border-top: 1px solid var(--cream);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .char-hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--border);
  }

  .examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .example-tag {
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    font-family: 'Noto Serif SC', serif;
  }

  .example-tag:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(200,147,58,0.04);
  }

  .send-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 11px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .send-btn:hover { background: var(--gold); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .spinner {
    width: 12px; height: 12px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .score-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .score-tab {
    padding: 12px 20px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: all 0.2s;
    position: relative;
  }

  .score-tab:hover { color: var(--gold); }

  .score-tab.active {
    color: var(--ink);
    border-bottom-color: var(--gold);
    font-weight: 400;
  }

  .score-badge-inline {
    display: inline-block;
    width: 20px; height: 20px;
    border-radius: 50%;
    text-align: center;
    line-height: 20px;
    font-size: 9px;
    margin-right: 4px;
    vertical-align: middle;
  }

  .results-container {
    display: none;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.05);
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-panel {
    display: none;
    padding: 32px 36px;
  }

  .result-panel.active { display: block; }

  .result-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--cream);
  }

  .score-circle {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 2px solid;
  }

  .score-circle .num {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .score-circle .label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .result-meta h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 6px;
  }

  .result-meta p {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
  }

  .content-block {
    margin-bottom: 28px;
  }

  .block-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .block-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--cream);
  }

  .speaking-text {
    font-size: 15px;
    line-height: 2;
    color: var(--ink);
    background: var(--paper);
    padding: 20px 24px;
    border-radius: 3px;
    border-left: 3px solid var(--gold);
  }

  .phrases-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .phrase-card {
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 14px;
    transition: all 0.2s;
  }

  .phrase-card:hover {
    border-color: var(--gold);
    background: rgba(200,147,58,0.03);
  }

  .phrase-en {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    font-family: 'DM Mono', monospace;
  }

  .phrase-zh {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  .phrase-usage {
    font-size: 11px;
    color: var(--sage);
    margin-top: 5px;
    font-style: italic;
    border-top: 1px solid var(--cream);
    padding-top: 5px;
  }

  .loading-state {
    display: none;
    padding: 60px 36px;
    text-align: center;
  }

  .loading-bar-wrap {
    width: 200px;
    height: 2px;
    background: var(--cream);
    margin: 20px auto 0;
    border-radius: 1px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-light), var(--gold));
    border-radius: 1px;
    animation: loadAnim 2s ease-in-out infinite;
    width: 40%;
  }

  @keyframes loadAnim {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .s65 { color: #7a9e87; border-color: #7a9e87; }
  .s70 { color: #5b8fa8; border-color: #5b8fa8; }
  .s75 { color: #8a7ec4; border-color: #8a7ec4; }
  .s80 { color: #b5512a; border-color: #b5512a; }
  .s85 { color: #c8933a; border-color: #c8933a; }
  .s90 { color: #1a1209; border-color: #1a1209; }

  @media (max-width: 600px) {
    main { padding: 40px 20px; }
    header { padding: 20px; }
    .phrases-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="grain"></div>

<header>
  <div>
    <div class="logo-text">Speaking <em>Studio</em></div>
    <div class="logo-sub">雅思口语提分工具</div>
  </div>
  <div class="badge">IELTS · Band 6.5 → 9</div>
</header>

<main>
  <div class="hero">
    <div class="hero-eyebrow">// Input in Chinese · Output in English</div>
    <h1>把你的日常，<span>变成雅思高分</span><br>口语素材</h1>
    <p>用中文描述你的生活、想法、经历，我们将为你生成从6.5到9分不同段位的标准口语范文，并标注所有高频表达词组。</p>
  </div>

  <div class="input-section">
    <div class="input-label">用中文描述你想表达的内容</div>
    <textarea id="userInput" placeholder="例如：昨天我去了一家很特别的咖啡馆，那里装修很有复古风格，咖啡也很好喝，我和朋友聊了很久……" maxlength="500"></textarea>
    <div class="input-footer">
      <div style="display:flex; flex-direction:column; gap:8px; flex:1;">
        <div class="examples">
          <span class="example-tag" onclick="fillExample(this)">去咖啡馆的经历</span>
          <span class="example-tag" onclick="fillExample(this)">最近看的一部电影</span>
          <span class="example-tag" onclick="fillExample(this)">我的家乡城市</span>
          <span class="example-tag" onclick="fillExample(this)">学习一项新技能</span>
          <span class="example-tag" onclick="fillExample(this)">一次难忘的旅行</span>
        </div>
        <div class="char-hint" id="charCount">0 / 500 字</div>
      </div>
      <button class="send-btn" id="sendBtn" onclick="generateContent()">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">生成素材</span>
      </button>
    </div>
  </div>

  <div class="results-container" id="results">
    <div class="score-tabs" id="scoreTabs"></div>
    <div class="loading-state" id="loadingState">
      <div class="loading-text">正在为您生成各分段口语素材</div>
      <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
    </div>
    <div id="panelsContainer"></div>
  </div>
</main>

<script>
const EXAMPLES = {
  '去咖啡馆的经历': '昨天我和朋友去了一家很有特色的咖啡馆，店里装修是复古风，墙上挂着很多老照片，咖啡味道很浓郁，我们聊了好久，感觉很放松。',
  '最近看的一部电影': '上周末我看了一部科幻电影，剧情很烧脑，特效也很震撼，里面探讨了人工智能和人类未来的关系，看完之后思考了很久。',
  '我的家乡城市': '我来自一个南方小城市，那里气候温暖湿润，有很多传统小吃，节奏比大城市慢很多，虽然现在很多年轻人都去大城市了，但我还是很怀念那里。',
  '学习一项新技能': '最近我在学弹吉他，一开始手指很疼，按弦按不稳，但练了两个月之后感觉进步很快，现在能弹一些简单的曲子了，很有成就感。',
  '一次难忘的旅行': '去年暑假我去了云南，爬了玉龙雪山，虽然高原反应让我很不舒服，但山顶的雪景太美了，完全值得。还去了丽江古城，古朴的街道让我印象很深。'
};

const SCORES = [
  { id: 's65', label: '6.5', desc: '基础流利', colorClass: 's65', descriptor: '能完整表达意思，词汇基础，偶有语法错误' },
  { id: 's70', label: '7.0', desc: '良好表达', colorClass: 's70', descriptor: '表达清晰，词汇较丰富，结构合理，偶有停顿' },
  { id: 's75', label: '7.5', desc: '进阶流利', colorClass: 's75', descriptor: '词汇多样，句式灵活，表达自然，少量小错误' },
  { id: 's80', label: '8.0', desc: '高级流利', colorClass: 's80', descriptor: '词汇精准丰富，逻辑严密，接近母语者水平' },
  { id: 's85', label: '8.5', desc: '近母语', colorClass: 's85', descriptor: '极其流利自然，语言地道，词汇高级精妙' },
  { id: 's90', label: '9.0', desc: '满分水准', colorClass: 's90', descriptor: '完全流利，措辞精准，表达优雅，毫无失误' },
];

const textarea = document.getElementById('userInput');
textarea.addEventListener('input', () => {
  document.getElementById('charCount').textContent = `${textarea.value.length} / 500 字`;
});

function fillExample(el) {
  const key = el.textContent.trim();
  if (EXAMPLES[key]) {
    textarea.value = EXAMPLES[key];
    textarea.dispatchEvent(new Event('input'));
  }
}

function setLoading(on) {
  const btn = document.getElementById('sendBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  btn.disabled = on;
  spinner.style.display = on ? 'block' : 'none';
  btnText.textContent = on ? '生成中…' : '生成素材';
}

function switchTab(scoreId) {
  document.querySelectorAll('.score-tab').forEach(t => t.classList.toggle('active', t.dataset.id === scoreId));
  document.querySelectorAll('.result-panel').forEach(p => p.classList.toggle('active', p.dataset.id === scoreId));
}

async function generateContent() {
  const input = textarea.value.trim();
  if (!input) return;

  setLoading(true);
  const resultsEl = document.getElementById('results');
  const loadingState = document.getElementById('loadingState');
  const panelsContainer = document.getElementById('panelsContainer');
  const scoreTabs = document.getElementById('scoreTabs');

  resultsEl.style.display = 'block';
  loadingState.style.display = 'block';
  panelsContainer.innerHTML = '';
  scoreTabs.innerHTML = '';

  const prompt = `你是一位雅思口语备考专家。用户用中文描述了一段内容，请你为该内容生成雅思口语6.5、7、7.5、8、8.5、9分六个段位的英文口语范文。

用户输入（中文）：${input}

请严格按照以下JSON格式返回，不要有任何其他文字：
{
  "scores": [
    {
      "band": "6.5",
      "text": "...(对应分数的英语口语范文，2-4句，自然口语风格)",
      "phrases": [
        {"en": "phrase", "zh": "中文释义", "usage": "使用场景说明"},
        ...至少4个高频词组
      ]
    },
    ...共6个分数段
  ]
}

要求：
1. 每个分段的范文要真实体现该分数段的词汇水平、句式复杂度和流利度差异
2. 越高分的范文越地道、词汇越高级、表达越自然
3. phrases中的词组必须真实出现在该段范文中，用**加粗**标记在text中（用<b>标签）
4. 范文要口语化，不要太书面
5. 每个分数段提供4-6个高频词组`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 3000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const rawText = data.content.map(c => c.text || '').join('');
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(jsonMatch[0]);

    loadingState.style.display = 'none';

    parsed.scores.forEach((item, i) => {
      const scoreInfo = SCORES[i];
      const tab = document.createElement('div');
      tab.className = 'score-tab' + (i === 0 ? ' active' : '');
      tab.dataset.id = scoreInfo.id;
      tab.innerHTML = `<span class="score-badge-inline ${scoreInfo.colorClass}" style="background:currentColor;color:var(--paper)">${item.band}</span>${scoreInfo.desc}`;
      tab.onclick = () => switchTab(scoreInfo.id);
      scoreTabs.appendChild(tab);

      const panel = document.createElement('div');
      panel.className = 'result-panel' + (i === 0 ? ' active' : '');
      panel.dataset.id = scoreInfo.id;

      const phrasesHTML = item.phrases.map(p => `
        <div class="phrase-card">
          <div class="phrase-en">${p.en}</div>
          <div class="phrase-zh">${p.zh}</div>
          <div class="phrase-usage">${p.usage}</div>
        </div>
      `).join('');

      panel.innerHTML = `
        <div class="result-header">
          <div class="score-circle ${scoreInfo.colorClass}">
            <div class="num">${item.band}</div>
            <div class="label">Band</div>
          </div>
          <div class="result-meta">
            <h3>${scoreInfo.desc} · Band ${item.band}</h3>
            <p>${scoreInfo.descriptor}</p>
          </div>
        </div>
        <div class="content-block">
          <div class="block-title">口语范文</div>
          <div class="speaking-text">${item.text}</div>
        </div>
        <div class="content-block">
          <div class="block-title">高频口语表达词组</div>
          <div class="phrases-grid">${phrasesHTML}</div>
        </div>
      `;

      panelsContainer.appendChild(panel);
    });

  } catch (err) {
    loadingState.innerHTML = `<div class="loading-text" style="color:#b5512a">生成失败，请稍后重试</div>`;
    console.error(err);
  }

  setLoading(false);
}
</script>
</body>
</html>
